<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <title>比價助手 — 每 100g 台幣單價</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>🛒 比價助手</h1>
      <p>不同包裝、不同外幣，統一換算成每 100g／100ml 台幣單價</p>
    </header>

    <!-- 輸入表單 -->
    <form class="card" id="calc-form">
      <div class="field">
        <label for="item-name">商品名稱（可留空）</label>
        <input type="text" id="item-name" placeholder="例：A 牌白米" />
      </div>

      <div class="row">
        <div class="field">
          <label for="price">價格（外幣）</label>
          <input type="text" id="price" inputmode="decimal" placeholder="10" />
        </div>
        <div class="field">
          <label for="currency">幣別</label>
          <select id="currency">
            <option value="USD">USD</option>
            <option value="JPY">JPY</option>
            <option value="EUR">EUR</option>
            <option value="KRW">KRW</option>
            <option value="CNY">CNY</option>
            <option value="GBP">GBP</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="amount">重量／容量</label>
          <input type="text" id="amount" inputmode="decimal" placeholder="500" />
        </div>
        <div class="field">
          <label for="unit">單位</label>
          <select id="unit">
            <option value="g">G</option>
            <option value="kg">KG</option>
            <option value="oz">OZ</option>
            <option value="lb">LB</option>
            <option value="ml">ML</option>
            <option value="l">L</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="rate">匯率（1 外幣 = N 台幣，暫手動輸入）</label>
        <input type="text" id="rate" inputmode="decimal" placeholder="31.25" />
      </div>

      <div class="row">
        <div class="field"><button type="submit" id="calc-btn">計算單價</button></div>
        <div class="field"><button type="button" class="secondary" id="add-btn">加入比價列表</button></div>
      </div>

      <div class="result" id="result" aria-live="polite"></div>
    </form>

    <!-- 比價列表 -->
    <section class="card">
      <div class="row" style="justify-content: space-between; align-items: center;">
        <strong>比價列表</strong>
        <button type="button" class="secondary del" id="clear-btn" style="width:auto;">清空</button>
      </div>
      <div id="history"></div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
