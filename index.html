<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <title>比價助手 — 每 100g 台幣單價</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- PWA：安裝設定與圖示（task 1.3）。相對路徑相容 GitHub Pages 子路徑 -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>
<body>
  <div class="app">
    <header>
      <h1>🛒 比價助手</h1>
      <p>不同包裝、不同外幣，統一換算成每 100g／100ml 台幣單價</p>
    </header>

    <!-- 輸入表單 -->
    <form class="card" id="calc-form">
      <div class="field">
        <label for="item-name">商品名稱（可留空）</label>
        <input type="text" id="item-name" placeholder="例：A 牌白米" />
      </div>

      <div class="row">
        <div class="field">
          <label for="price">價格（外幣）</label>
          <input type="text" id="price" inputmode="decimal" placeholder="10" />
        </div>
        <div class="field">
          <label for="currency">幣別</label>
          <select id="currency">
            <option value="USD">USD</option>
            <option value="TWD">TWD</option>
            <option value="JPY">JPY</option>
            <option value="EUR">EUR</option>
            <option value="KRW">KRW</option>
            <option value="CNY">CNY</option>
            <option value="GBP">GBP</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="amount" id="amount-label">重量／容量</label>
          <input type="text" id="amount" inputmode="decimal" placeholder="500" />
        </div>
        <div class="field">
          <label for="unit">單位</label>
          <select id="unit">
            <option value="g">g</option>
            <option value="kg">kg</option>
            <option value="oz">oz</option>
            <option value="lb">lb</option>
            <option value="ml">mL</option>
            <option value="l">L</option>
            <option value="個">個</option>
          </select>
        </div>
      </div>

      <div class="field" id="rate-field">
        <label for="rate">匯率（1 外幣 = N 台幣）</label>
        <input type="text" id="rate" inputmode="decimal" placeholder="31.25" />
        <div class="rate-status" id="rate-status" aria-live="polite"></div>
      </div>

      <div class="row">
        <div class="field"><button type="submit" id="calc-btn">計算單價</button></div>
        <div class="field"><button type="button" class="secondary" id="add-btn">加入比價列表</button></div>
      </div>

      <div class="result" id="result" aria-live="polite"></div>
    </form>

    <!-- 比價列表 -->
    <section class="card">
      <div class="row" style="justify-content: space-between; align-items: center;">
        <strong>比價列表</strong>
        <button type="button" class="secondary del" id="clear-btn" style="width:auto;">清空</button>
      </div>
      <div id="history"></div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
  <!-- 註冊 Service Worker（task 5.3）。相對路徑使 scope 隨部署路徑自動對應 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((err) => console.error('SW 註冊失敗', err))
      })
    }
  </script>
</body>
</html>
